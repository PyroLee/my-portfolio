;\n        }\n\n        .popup-content {\n            line-height: 1.5;\n        }\n\n        .popup-section {\n            margin-bottom: 16px;\n        }\n\n        .popup-section h4 {\n            font-size: 14px;\n            font-weight: 600;\n            margin-bottom: 6px;\n            color: #141413;\n        }\n\n        .popup-section p {\n            font-size: 14px;\n            color: #5e5d59;\n        }\n\n        .status-badge {\n            display: inline-block;\n            padding: 4px 8px;\n            border-radius: 4px;\n            font-size: 12px;\n            font-weight: 500;\n        }\n\n        .status-in-progress {\n            background: #e9f7f2;\n            color: #2F9477;\n        }\n\n        .status-planning {\n            background: #f1f0ff;\n            color: #413A87;\n        }\n\n        .status-not-started {\n            background: #f0eee6;\n            color: #5e5d59;\n        }\n\n        .overlay {\n            position: fixed;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: rgba(0, 0, 0, 0.3);\n            z-index: 999;\n            display: none;\n        }\n\n        @media (max-width: 768px) {\n            .chart-container {\n                height: calc(100vh - 140px);\n                min-height: 400px;\n            }\n        }\n        \n        @media (max-width: 480px) {\n            .chart-container {\n                height: calc(100vh - 140px);\n                min-height: 350px;\n            }\n        }\n    \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n    \u003cdiv class=\"container\"\u003e\n        \u003cdiv class=\"toggle-section\"\u003e\n            \u003cdiv class=\"toggle-buttons\"\u003e\n                \u003cbutton class=\"toggle-btn active\" data-dept=\"all\"\u003eAll\u003c/button\u003e\n                \u003cbutton class=\"toggle-btn\" data-dept=\"Data Analysis\"\u003eData Analysis\u003c/button\u003e\n                \u003cbutton class=\"toggle-btn\" data-dept=\"Product Management\"\u003eProduct Management\u003c/button\u003e\n                \u003cbutton class=\"toggle-btn\" data-dept=\"HR\"\u003eHR\u003c/button\u003e\n                \u003cbutton class=\"toggle-btn\" data-dept=\"Sales\"\u003eSales\u003c/button\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"chart-section\"\u003e\n            \u003cdiv class=\"chart-container\"\u003e\n                \u003ccanvas id=\"timelineChart\"\u003e\u003c/canvas\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cdiv class=\"overlay\" id=\"overlay\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"details-popup\" id=\"detailsPopup\"\u003e\n        \u003cdiv class=\"popup-header\"\u003e\n            \u003cdiv class=\"popup-title\" id=\"popupTitle\"\u003e\u003c/div\u003e\n            \u003cbutton class=\"close-button\" id=\"closeButton\"\u003e\u0026times;\u003c/button\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"popup-content\" id=\"popupContent\"\u003e\u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cscript\u003e\n        Chart.defaults.font.family = 'system-ui, -apple-system, Segoe UI, sans-serif';\n        Chart.defaults.color = '#141413';\n        Chart.defaults.backgroundColor = '#ffffff';\n        Chart.defaults.borderColor = '#d1cfc5';\n        Chart.defaults.maintainAspectRatio = false;\n        Chart.defaults.responsive = true;\n        Chart.defaults.plugins.legend.position = 'bottom';\n        Chart.defaults.plugins.legend.labels.usePointStyle = false;\n        Chart.defaults.plugins.legend.labels.boxWidth = 12;\n        Chart.defaults.plugins.legend.labels.boxHeight = 12;\n        Chart.defaults.plugins.title.display = false;\n\n        const projectData = [\n            {\n                id: 'P001',\n                name: 'Market Research \u0026 Analysis',\n                duration: 4,\n                budget: 45,\n                complexity: 6,\n                priority: 9,\n                resource: 7,\n                department: 'Data Analysis',\n                status: 'In Progress',\n                budgetFormatted: '$45,000',\n                phase: 'Discovery \u0026 Research',\n                description: 'Establish baseline understanding of current customer experience gaps through comprehensive market research and competitive analysis.',\n                outcomes: 'Customer Behavior Analysis Report, Market Intelligence Dashboard'\n            },\n            {\n                id: 'P002',\n                name: 'Customer Journey Mapping',\n                duration: 6,\n                budget: 32,\n                complexity: 8,\n                priority: 10,\n                resource: 6,\n                department: 'Product Management',\n                status: 'Planning',\n                budgetFormatted: '$32,000',\n                phase: 'Discovery \u0026 Research',\n                description: 'Map current and future state customer journeys to identify pain points and optimization opportunities.',\n                outcomes: 'Current State Journey Maps, Future State Process Maps'\n            },\n            {\n                id: 'P003',\n                name: 'Technology Assessment',\n                duration: 5,\n                budget: 28,\n                complexity: 7,\n                priority: 8,\n                resource: 8,\n                department: 'Data Analysis',\n                status: 'Not Started',\n                budgetFormatted: '$28,000',\n                phase: 'Discovery \u0026 Research',\n                description: 'Evaluate current technology stack and identify integration requirements for enhanced customer experience.',\n                outcomes: 'Technical Integration Specifications, System Requirements'\n            },\n            {\n                id: 'P004',\n                name: 'Stakeholder Alignment',\n                duration: 5,\n                budget: 15,\n                complexity: 4,\n                priority: 7,\n                resource: 5,\n                department: 'HR',\n                status: 'Planning',\n                budgetFormatted: '$15,000',\n                phase: 'Discovery \u0026 Research',\n                description: 'Conduct stakeholder alignment sessions and develop change management strategy.',\n                outcomes: 'Stakeholder Requirements Document, Change Management Plan'\n            },\n            {\n                id: 'P005',\n                name: 'Process Design \u0026 Documentation',\n                duration: 6,\n                budget: 38,\n                complexity: 9,\n                priority: 9,\n                resource: 7,\n                department: 'Product Management',\n                status: 'Not Started',\n                budgetFormatted: '$38,000',\n                phase: 'Planning \u0026 Design',\n                description: 'Design optimal customer experience framework and document new processes.',\n                outcomes: 'Process Documentation, Framework Specifications'\n            },\n            {\n                id: 'P006',\n                name: 'Staff Training Development',\n                duration: 7,\n                budget: 42,\n                complexity: 6,\n                priority: 8,\n                resource: 9,\n                department: 'HR',\n                status: 'Not Started',\n                budgetFormatted: '$42,000',\n                phase: 'Planning \u0026 Design',\n                description: 'Develop comprehensive training curriculum and materials for all staff.',\n                outcomes: 'Training Curriculum, Learning Materials, Certification Process'\n            },\n            {\n                id: 'P010',\n                name: 'Performance Monitoring Setup',\n                duration: 4,\n                budget: 25,\n                complexity: 8,\n                priority: 7,\n                resource: 6,\n                department: 'Data Analysis',\n                status: 'Not Started',\n                budgetFormatted: '$25,000',\n                phase: 'Implementation',\n                description: 'Establish performance monitoring dashboards and KPI tracking.',\n                outcomes: 'Monitoring Dashboards, KPI Framework, Reporting System'\n            },\n            {\n                id: 'P011',\n                name: 'Full Rollout Implementation',\n                duration: 8,\n                budget: 125,\n                complexity: 9,\n                priority: 10,\n                resource: 10,\n                department: 'Sales',\n                status: 'Not Started',\n                budgetFormatted: '$125,000',\n                phase: 'Implementation',\n                description: 'Execute full rollout across all customer touchpoints and departments.',\n                outcomes: 'Full Implementation, Training Completion, Go-Live Success'\n            }\n        ];\n\n        const departmentColors = {\n            'Data Analysis': '#2F9477',\n            'Product Management': '#413A87',\n            'HR': '#F0A8C0',\n            'Sales': '#F56D40',\n            'Marketing': '#4B93DB'\n        };\n\n        let chart;\n        let filteredData = [...projectData];\n\n        function createChartData(data = projectData) {\n            return {\n                labels: data.map(p =\u003e p.name),\n                datasets: [{\n                    label: 'Project Duration (Weeks)',\n                    data: data.map(p =\u003e p.duration),\n                    backgroundColor: data.map(p =\u003e departmentColors[p.department]),\n                    borderColor: data.map(p =\u003e departmentColors[p.department]),\n                    borderWidth: 0,\n                    borderSkipped: false\n                }]\n            };\n        }\n\n        const config = {\n            type: 'bar',\n            data: createChartData(),\n            options: {\n                responsive: true,\n                maintainAspectRatio: false,\n                indexAxis: 'y',\n                interaction: {\n                    intersect: false,\n                    mode: 'point'\n                },\n                onClick: (event, elements) =\u003e {\n                    if (elements \u0026\u0026 elements.length \u003e 0) {\n                        const dataIndex = elements[0].index;\n                        const project = filteredData[dataIndex];\n                        showProjectDetails(project);\n                    }\n                },\n                plugins: {\n                    legend: {\n                        position: 'bottom',\n                        align: 'start',\n                        labels: {\n                            usePointStyle: false,\n                            boxWidth: 12,\n                            boxHeight: 12,\n                            padding: 20,\n                            font: {\n                                family: 'system-ui, -apple-system, Segoe UI, sans-serif',\n                                size: 12,\n                                weight: 500\n                            },\n                            color: '#141413',\n                            generateLabels: function(chart) {\n                                const departments = [...new Set(filteredData.map(p =\u003e p.department))];\n                                return departments.map(dept =\u003e ({\n                                    text: dept,\n                                    fillStyle: departmentColors[dept],\n                                    strokeStyle: departmentColors[dept],\n                                    lineWidth: 0,\n                                    hidden: false,\n                                    index: dept\n                                }));\n                            }\n                        },\n                        onClick: function(evt, legendItem) {\n                            const department = legendItem.index;\n                            \n                            document.querySelectorAll('.toggle-btn').forEach(btn =\u003e {\n                                btn.classList.remove('active');\n                                if (btn.getAttribute('data-dept') === department) {\n                                    btn.classList.add('active');\n                                }\n                            });\n                            \n                            if (department === 'all') {\n                                document.querySelector('[data-dept=\"all\"]').classList.add('active');\n                            }\n                            \n                            filterByDepartment(department);\n                        }\n                    },\n                    tooltip: {\n                        backgroundColor: 'white',\n                        titleColor: '#141413',\n                        bodyColor: '#5e5d59',\n                        borderColor: 'transparent',\n                        borderWidth: 0,\n                        cornerRadius: 6,\n                        displayColors: true,\n                        boxWidth: 12,\n                        boxHeight: 12,\n                        boxPadding: 4,\n                        usePointStyle: false,\n                        titleFont: {\n                            family: 'system-ui, -apple-system, Segoe UI, sans-serif',\n                            size: 14,\n                            weight: 600\n                        },\n                        bodyFont: {\n                            family: 'system-ui, -apple-system, Segoe UI, sans-serif',\n                            size: 12,\n                            weight: 400\n                        },\n                        callbacks: {\n                            title: function(context) {\n                                const project = filteredData[context[0].dataIndex];\n                                return project.name;\n                            },\n                            label: function(context) {\n                                const project = filteredData[context.dataIndex];\n                                return [\n                                    `Duration: ${project.duration} weeks`,\n                                    `Department: ${project.department}`,\n                                    `Status: ${project.status}`,\n                                    `Budget: ${project.budgetFormatted}`,\n                                    `Phase: ${project.phase}`\n                                ];\n                            }\n                        }\n                    }\n                },\n                scales: {\n                    x: {\n                        beginAtZero: true,\n                        max: 10,\n                        ticks: {\n                            stepSize: 1,\n                            callback: function(value) {\n                                return value + (value === 1 ? ' week' : ' weeks');\n                            },\n                            font: {\n                                family: 'system-ui, -apple-system, Segoe UI, sans-serif',\n                                size: 11,\n                                weight: 400\n                            },\n                            color: '#141413'\n                        },\n                        grid: {\n                            color: '#d1cfc5',\n                            lineWidth: 1\n                        },\n                        title: {\n                            display: true,\n                            text: 'Project Duration (Weeks)',\n                            font: {\n                                family: 'system-ui, -apple-system, Segoe UI, sans-serif',\n                                size: 12,\n                                weight: 500\n                            },\n                            color: '#141413'\n                        }\n                    },\n                    y: {\n                        ticks: {\n                            font: {\n                                family: 'system-ui, -apple-system, Segoe UI, sans-serif',\n                                size: 10,\n                                weight: 400\n                            },\n                            color: '#141413',\n                            autoSkip: false,\n                            callback: function(value, index) {\n                                const project = filteredData[index];\n                                if (!project) return '';\n                                \n                                const name = project.name;\n                                const maxLength = 20;\n                                \n                                if (name.length \u003e maxLength) {\n                                    const words = name.split(' ');\n                                    let lines = [];\n                                    let currentLine = '';\n                                    \n                                    words.forEach(word =\u003e {\n                                        if ((currentLine + word).length \u003e maxLength \u0026\u0026 currentLine.length \u003e 0) {\n                                            lines.push(currentLine.trim());\n                                            currentLine = word + ' ';\n                                        } else {\n                                            currentLine += word + ' ';\n                                        }\n                                    });\n                                    if (currentLine.trim().length \u003e 0) {\n                                        lines.push(currentLine.trim());\n                                    }\n                                    \n                                    return lines.length \u003e 2 ? [lines[0], lines[1] + '...'] : lines;\n                                }\n                                return name;\n                            }\n                        },\n                        grid: {\n                            display: false\n                        }\n                    }\n                },\n                animation: {\n                    duration: 750,\n                    easing: 'easeInOutQuart'\n                },\n                elements: {\n                    bar: {\n                        borderSkipped: false\n                    }\n                }\n            }\n        };\n\n        function showProjectDetails(project) {\n            const popup = document.getElementById('detailsPopup');\n            const overlay = document.getElementById('overlay');\n            const title = document.getElementById('popupTitle');\n            const content = document.getElementById('popupContent');\n            \n            title.textContent = project.name;\n            \n            const statusClass = project.status.toLowerCase().replace(' ', '-');\n            \n            content.innerHTML = `\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003eStatus\u003c/h4\u003e\n                    \u003cp\u003e\u003cspan class=\"status-badge status-${statusClass}\"\u003e${project.status}\u003c/span\u003e\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003eDepartment\u003c/h4\u003e\n                    \u003cp\u003e${project.department}\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003ePhase\u003c/h4\u003e\n                    \u003cp\u003e${project.phase}\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003eDuration\u003c/h4\u003e\n                    \u003cp\u003e${project.duration} weeks\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003eBudget\u003c/h4\u003e\n                    \u003cp\u003e${project.budgetFormatted}\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003eComplexity Score\u003c/h4\u003e\n                    \u003cp\u003e${project.complexity}/10\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003ePriority Level\u003c/h4\u003e\n                    \u003cp\u003e${project.priority}/10\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003eResource Intensity\u003c/h4\u003e\n                    \u003cp\u003e${project.resource}/10\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003eDescription\u003c/h4\u003e\n                    \u003cp\u003e${project.description}\u003c/p\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"popup-section\"\u003e\n                    \u003ch4\u003eExpected Outcomes\u003c/h4\u003e\n                    \u003cp\u003e${project.outcomes}\u003c/p\u003e\n                \u003c/div\u003e\n            `;\n            \n            overlay.style.display = 'block';\n            popup.style.display = 'block';\n        }\n\n        function filterByDepartment(department) {\n            if (department === 'all') {\n                filteredData = [...projectData];\n            } else {\n                filteredData = projectData.filter(p =\u003e p.department === department);\n            }\n            \n            chart.data = createChartData(filteredData);\n            chart.update();\n        }\n\n        function closePopup() {\n            document.getElementById('detailsPopup').style.display = 'none';\n            document.getElementById('overlay').style.display = 'none';\n        }\n\n        document.getElementById('closeButton').addEventListener('click', closePopup);\n        document.getElementById('overlay').addEventListener('click', closePopup);\n\n        document.addEventListener('DOMContentLoaded', function() {\n            const ctx = document.getElementById('timelineChart').getContext('2d');\n            chart = new Chart(ctx, config);\n            \n            chart.canvas.style.cursor = 'pointer';\n            \n            chart.canvas.addEventListener('mousemove', function(event) {\n                const points = chart.getElementsAtEventForMode(event, 'nearest', { intersect: true }, true);\n                chart.canvas.style.cursor = points.length \u003e 0 ? 'pointer' : 'default';\n            });\n            \n            document.querySelectorAll('.toggle-btn').forEach(btn =\u003e {\n                btn.addEventListener('click', function() {\n                    document.querySelectorAll('.toggle-btn').forEach(b =\u003e b.classList.remove('active'));\n                    this.classList.add('active');\n                    const department = this.getAttribute('data-dept');\n                    filterByDepartment(department);\n                });\n            });\n        });\n\n        document.addEventListener('keydown', function(event) {\n            if (event.key === 'Escape') {\n                closePopup();\n            }\n        });\n    \u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e"])</script><script nonce="">self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"artifact\":{\"title\":\"Enterprise Initiative Rollout - Interactive Timeline\",\"language\":\"$undefined\",\"type\":\"text/html\",\"content\":\"$19\",\"description\":\"Track enterprise initiative rollouts with an interactive timeline fe
